<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="#faf8f5" stroke="#2c3e50" stroke-width="1.5"/>
  <!-- Globe latitude lines -->
  <ellipse cx="16" cy="11" rx="10" ry="3" fill="none" stroke="#d4c5b0" stroke-width="0.7"/>
  <ellipse cx="16" cy="16" rx="10" ry="3" fill="none" stroke="#d4c5b0" stroke-width="0.7"/>
  <ellipse cx="16" cy="21" rx="10" ry="3" fill="none" stroke="#d4c5b0" stroke-width="0.7"/>
  <!-- Globe meridian -->
  <ellipse cx="16" cy="16" rx="3" ry="12" fill="none" stroke="#d4c5b0" stroke-width="0.7"/>
  <!-- Equator -->
  <line x1="6" y1="16" x2="26" y2="16" stroke="#d4c5b0" stroke-width="0.8"/>
  <!-- Paper airplane (amber) pointing NE -->
  <polygon points="3,21 17,7 28,13" fill="#c17f3c"/>
  <polygon points="3,21 17,7 16,19" fill="#a66b2e"/>
</svg>